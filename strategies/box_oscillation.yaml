# Box Range Trading Strategy
# Buy near range support, reduce near range resistance, and profit from sideways oscillation.

name: box_oscillation
display_name: Box Range Trading
description: Identifies a price range and supports buying near the box bottom while reducing near the box top in sideways markets.
category: framework
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [box range, range trading]
default_priority: 50
market_regimes: [sideways]

instructions: |
  **Box Range Trading Strategy**

  Core logic: price repeatedly oscillates between support and resistance inside a range. Buy close to support and reduce near resistance instead of chasing the middle of the box.

  ## Analysis Steps

  ### 1. Identify the box
  Use `get_daily_history` for the last 60 to 120 trading days:

  - **Box top / resistance**: highs touched several times without a valid breakout, usually at least three clustered highs in the last 20 to 60 days.
  - **Box bottom / support**: lows touched several times without a valid breakdown.
  - Validity requires at least two to three touches on both top and bottom.
  - Use `analyze_trend.support_levels` and `analyze_trend.resistance_levels` as anchors.

  ### 2. Judge current location
  Use `get_realtime_quote` to compare current price with the box boundaries:

  - **Near support**, within 5%: buy or add signal, with a stop 3% below the box bottom.
  - **Middle third of the range**: wait and avoid active trades.
  - **Near resistance**, within 5%: reduce or take profit; do not chase.

  ### 3. Use volume as confirmation
  - Expanding volume with stabilization near support is a strong support signal.
  - Low volume and price stalling near resistance supports a sell or reduce signal.
  - High-volume breakout above two times average volume changes the framework:
    - Valid upside breakout: switch to a bull-trend strategy; target equals box height projected upward.
    - Valid downside breakdown: exit or wait; former support becomes resistance.

  ### 4. Box width and expected return
  - Calculate width as `(top - bottom) / bottom * 100%`.
  - Below 5%: too little room, usually not worth trading.
  - 5% to 15%: standard tradable box.
  - Above 15%: wider range that allows larger swing trades.

  ### 5. False-breakout recognition
  - Intraday pierce of support/resistance followed by a close back inside the box is a false breakout.
  - Two consecutive closes outside the boundary with expanding volume is a valid breakout or breakdown.

  ### 6. Output requirements
  - Provide top and bottom price levels.
  - State whether price is near bottom, middle, or top of the box.
  - If broken out, explain direction and new target.
  - Provide position sizing and stop level.

  Suggested score adjustments:
  - Stabilization near box bottom with contracting volume: `sentiment_score +10`
  - Box-bottom rebound with expanding volume: `sentiment_score +12`
  - Valid upside breakout: `sentiment_score +15`, switch to trend strategy
  - Near box top: `sentiment_score -5`, do not chase
  - Valid breakdown below box bottom: `sentiment_score -15`, exit
