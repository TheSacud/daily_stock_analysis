# Chan Theory Strategy
# Based on Chan theory: fractals, strokes, segments, central zones, and divergence analysis.

name: chan_theory
display_name: Chan Theory
description: Uses Chan-theory strokes, segments, and central-zone structure to judge trend degree, buy/sell points, and divergence signals.
category: framework
core_rules: [1, 2, 3, 4]
