# Shrink Volume Pullback Strategy
# Volume contracts during a pullback to MA5 or MA10, then price stabilizes or rebounds.

name: shrink_pullback
display_name: Shrink Volume Pullback
description: Detects low-volume pullbacks to moving-average support, an ideal continuation entry in an existing trend.
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [low-volume pullback, pullback]
default_router: true
default_priority: 40
market_regimes: [trending_down, sideways]

instructions: |
  **Shrink Volume Pullback Strategy**

  Entry criteria:

  1. **Prerequisite trend**
     - The stock should already be in an uptrend with MA5 > MA10 > MA20.
     - Use `analyze_trend` to confirm bullish alignment.

  2. **Pullback detection**
     - Use `get_daily_history` and `get_realtime_quote`.
     - Price should pull back to near MA5 within 1% or near MA10 within 2%.
     - Pullback volume should be below 70% of the 5-day average.
     - `analyze_trend.volume_status` should indicate contraction when available.

  3. **Rebound signal**
     - Current price should hold moving-average support.
     - MA5 bias below 2% is the best entry zone.

  4. **Confirmation conditions**
     - `search_stock_news` should not reveal fresh negative catalysts.
     - Chip distribution, if available, should show healthy cost concentration.

  Score adjustments:
  - Low-volume pullback to MA5: `sentiment_score +10`
  - Low-volume pullback to MA10 with volume below 0.6x average: `sentiment_score +8`
  - Ideal entry is near MA5; secondary entry is near MA10.
  - Stop reference is near MA20.
  - Mention `low-volume pullback` in `buy_reason`.
