# Hot Theme Strategy

name: hot_theme
display_name: Hot Theme
description: Tracks policy, industry, and market themes to judge theme strength, sector diffusion, and stock-level relative strength.
category: framework
core_rules: [2, 3, 5, 7]
required_tools:
  - get_sector_rankings
  - search_stock_news
  - get_realtime_quote
  - analyze_trend
aliases: [hot theme, theme, market theme]
default_priority: 35
market_regimes: [sector_hot]

instructions: |
  **Hot Theme Strategy**

  Use cases:
  - The market has a clear policy, industry, technology-roadmap, or crowded-fund theme.
  - Judge whether the stock truly benefits from the theme or is only loosely associated with it.

  Analysis framework:

  1. **Theme strength**
     - Use `get_sector_rankings` to judge whether the related sector leads on gains, turnover, or attention.
     - Watch whether the theme spreads from a few core stocks to a wider group.
     - If only one stock moves and the sector does not confirm, lower signal weight.

  2. **Stock relevance**
     - Use `search_stock_news` to check whether the company's business, orders, capacity, customers, or filings are directly related to the theme.
     - Separate direct beneficiaries, indirect beneficiaries, and weak concept links.
     - If relevance is weak but the stock has already rallied sharply, flag theme-realization risk.

  3. **Relative strength**
     - Use `get_realtime_quote` and `analyze_trend` to compare the stock's move, volume ratio, and turnover with the sector average.
     - Strong theme stocks usually have expanding volume, active turnover, and pullbacks that hold key averages.

  4. **Timing and risk**
     - Do not chase after continuous acceleration or excessive bias.
     - If headlines focus on prior gains, speculative trading, or crowded capital flows, watch for a short-term sentiment top.
     - Major bad news, regulatory inquiries, or clarification announcements can sharply lower the rating.

  Output requirements:
  - Classify the theme stage as launch, diffusion, divergence, or fading.
  - Explain the stock's substantive relevance to the theme.
  - Provide executable triggers: pullback support, volume breakout, continued sector confirmation, or fading-theme stop.

  Suggested score adjustments:
  - Theme in launch or diffusion stage with substantive stock benefit: `sentiment_score +12`
  - Stock stronger than sector with volume confirmation: additional `+6`
  - Theme entering divergence or fading stage: `sentiment_score -8`
  - Weak concept link with excessive bias: `sentiment_score -12`
