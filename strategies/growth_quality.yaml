# Growth Quality Strategy

name: growth_quality
display_name: Growth Quality
description: Combines revenue and profit growth, ROE, cash flow, and industry runway to identify high-quality growth stocks and growth-deceleration risk.
category: framework
core_rules: [2, 3, 5]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - search_stock_news
  - analyze_trend
aliases: [growth, growth stock, growth quality]
default_priority: 55
market_regimes: [trending_up]

instructions: |
  **Growth Quality Strategy**

  Use cases:
  - Focus on medium- and long-term growth capacity rather than only short-term technical patterns.
  - Suitable for companies in strong industries, with improving fundamentals, or with expanding business models.

  Analysis framework:

  1. **Growth**
     - Prioritize revenue, net profit attributable to shareholders, operating cash flow, and ROE from financial fields.
     - Check whether revenue growth and profit growth move together, and flag revenue growth without profit growth.
     - If there is only theme heat without financial validation, lower growth certainty.

  2. **Quality**
     - Higher and stable ROE indicates stronger quality.
     - Operating cash flow moving with net profit indicates more reliable earnings.
     - If cash flow is much weaker than profit, flag collection, inventory, or receivables risk.

  3. **Valuation tolerance**
     - Use PE, PB, market cap, and related fields to judge whether growth is already priced in.
     - High growth can support a higher valuation, but explain whether growth can cover the valuation.
     - High valuation with slowing growth should sharply reduce the score.

  4. **Trend confirmation**
     - Use `analyze_trend` to judge whether market funds have confirmed the growth thesis.
     - If fundamentals improve but the technical trend has not confirmed, prefer observation conditions over direct chase entries.

  Output requirements:
  - Classify the company as high-quality growth, growth under validation, slowing growth, or invalidated growth.
  - Explain whether growth comes from revenue expansion, margin improvement, industry strength, or one-off factors.
  - Provide suitable growth-stock entry points: breakout after earnings validation, pullback to long-term averages, or valuation reset.

  Suggested score adjustments:
  - Revenue, profit, cash flow, and ROE improve together: `sentiment_score +15`
  - Industry strength and company news validate each other: additional `+6`
  - High valuation without growth validation: `sentiment_score -8`
  - Revenue grows without profit or cash flow worsens: `sentiment_score -12`
