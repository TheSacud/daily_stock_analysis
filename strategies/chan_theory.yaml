instructions: |
  **Chan Theory / Zen Channel Theory**

  Core framework: fractal -> stroke -> segment -> central zone -> trend.

  ## Analysis Steps

  ### 1. Judge price structure and central zones
  - Use `get_daily_history` for the last 60 daily bars.
  - Identify recent swing highs and lows, then decide whether price is inside a central-zone consolidation or in a trend segment away from the zone.
  - A central zone is an overlapping range formed by at least three consecutive segments.
  - A trend is a sequence of same-degree central zones moving in one direction.

  ### 2. Divergence, highest-priority signal
  - **Top divergence**: price makes a new high while MACD red-bar area shrinks; this is a sell or reduce signal.
  - **Bottom divergence**: price makes a new low while MACD green-bar area shrinks; this is a buy or add signal.
  - Use `analyze_trend` MACD fields and compare them with price swing highs/lows.

  ### 3. Buy and sell point classification
  - **First buy**: the final central zone in a downtrend shows bottom divergence.
  - **Second buy**: the first pullback after leaving the downtrend central zone does not break the zone high.
  - **Third buy**: price breaks upward after central-zone consolidation and does not fall back into the zone.
  - First, second, and third sell points are the symmetric bearish structures.
  - Position size depends on the degree and clarity of the current buy/sell point.

  ### 4. Degree and position sizing
  - Daily-level buy/sell points can justify moderate size, around 30% to 50%.
  - Weekly-level buy/sell points can justify larger size, around 50% to 80%.
  - Multi-degree alignment, such as daily and weekly in the same direction, is the strongest signal.

  ### 5. Output requirements
  - State whether price is in an uptrend, downtrend, or central-zone consolidation.
  - Identify whether divergence exists and at what degree.
  - Give the current buy/sell point type. If none exists, say there is no clear buy/sell point.
  - For buys, set the stop below the prior low; for sells, use the prior high as invalidation.

  Suggested score adjustments:
  - Bottom divergence plus first-buy signal: `sentiment_score +15`
  - Second-buy or third-buy alignment: `sentiment_score +10`
  - Central-zone consolidation without clear direction: keep the base score
  - Top divergence or downtrend: `sentiment_score -15`
