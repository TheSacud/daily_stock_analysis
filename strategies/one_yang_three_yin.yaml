# One Strong Bullish Candle Around Three Bearish Candles Strategy
# Candlestick pattern: bullish candle, three small bearish candles, then bullish breakout.

name: one_yang_three_yin
display_name: One Bullish Candle Around Three Bearish Candles
description: Detects a consolidation candlestick pattern where a bullish setup resumes after three small bearish or narrow-range candles.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [one bullish three bearish, bullish consolidation pattern]
default_priority: 110

instructions: |
  **One Bullish Candle Around Three Bearish Candles Strategy**

  Pattern definition using the latest five trading days:

  1. **Day 1**: strong bullish candle, close above open, real body above 2% of price.
  2. **Days 2 to 4**: three consecutive bearish or small-range candles:
     - Each candle's low should not break below day 1 open.
     - Volume should contract gradually, with volume ratio below 0.8 preferred.
     - The candles should close inside the real-body range of day 1.
  3. **Day 5**: another bullish candle with close above day 1 close.

  Tool usage:

  1. Use `get_daily_history` to fetch the latest 10 days.
  2. Check whether the last five candles match the pattern.
  3. Use `analyze_trend` to confirm bullish alignment, ideally MA5 > MA10 > MA20.

  Score adjustments:
  - Pattern confirmed with bullish trend: `sentiment_score +15`
  - Pattern confirmed but trend unclear: `sentiment_score +5`
  - Mention the candlestick pattern in `pattern_analysis` and `buy_reason`.
  - Ideal entry is near the day-5 close; stop is below the day-1 open.
