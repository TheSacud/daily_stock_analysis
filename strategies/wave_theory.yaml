instructions: |
  **Elliott Wave Theory**

  Core principle: markets often move in a five-wave impulse followed by a three-wave correction.

  ## Analysis Steps

  ### 1. Identify current wave position
  Use `get_daily_history` for the last 120 days and combine it with `analyze_trend`:

  **Impulse waves, 1-3-5**:
  - Wave 1: first leg of a trend reversal, normally with moderate volume expansion.
  - Wave 3: strongest impulse wave, usually with heavy volume and strong MACD; it must not be the shortest wave.
  - Wave 5: volume often weakens versus wave 3; top divergence suggests the advance is near completion.

  **Corrective waves, A-B-C**:
  - Wave A: first decline, often on relatively high volume while most traders see it as a pullback.
  - Wave B: rebound weaker than the prior advance, with contracting volume and high trap risk.
  - Wave C: second decline, often stronger than wave A and completes the correction.

  ### 2. Fibonacci location checks
  - Wave 2 usually retraces 38.2% to 61.8% of wave 1.
  - Wave 3 target is often a 1.618x to 2.618x extension of wave 1.
  - Wave 4 must not overlap wave 1 price territory.
  - Wave C target is measured from the wave A high and is usually equal to or longer than wave A.

  ### 3. Best entry points
  - **Wave 2 stabilization**: safest buy zone, with stop below the start of wave 1.
  - **Wave 4 stabilization**: second-best entry, with stop below the wave 1 high.
  - **Early wave 3 breakout**: buy when price breaks wave 1 high with volume.
  - Avoid chasing late wave 5 because top-divergence risk is high.

  ### 4. Risk notes
  - Wave B rebounds should not receive heavy position size.
  - Wave counts are subjective and must be validated with other indicators.
  - If a wave rule is violated, such as wave 4 overlapping wave 1, recount the structure.

  ### 5. Output requirements
  - State the likely wave position, such as mid-wave 3 or possible wave 4 correction.
  - Provide key Fibonacci support/resistance levels: 0.382, 0.618, and 1.618.
  - State whether this is a buy opportunity, a wait setup, or an avoid zone.
  - Mark wave-count confidence as high, medium, or low.

  Suggested score adjustments:
  - Wave 2 stabilization at a golden retracement: `sentiment_score +15`
  - Confirmed wave 3 breakout: `sentiment_score +12`
  - Late wave 5 or top divergence: `sentiment_score -10`
  - During wave C decline: `sentiment_score -12`
