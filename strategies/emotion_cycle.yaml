# Sentiment Cycle Strategy
# Uses market sentiment, turnover rate, and volume patterns to time entries against crowd behavior.

name: emotion_cycle
display_name: Sentiment Cycle
description: Uses sentiment, turnover, and volume-price structure to identify panic-bottom and mania-top zones for contrarian positioning.
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news
aliases: [sentiment, sentiment cycle]
default_priority: 100
market_regimes: [sector_hot]

instructions: |
  **Sentiment Cycle Strategy**

  Core idea: market sentiment cycles through panic, pessimism, doubt, hope, optimism, excitement, greed, and mania. Smart money accumulates near panic bottoms and exits near mania tops.

  ## Sentiment Quantification

  ### Step 1: Turnover analysis, the main heat indicator
  Use `get_daily_history` and `get_realtime_quote`:

  - **Turnover below 0.5% per day**: cold market with little attention, possible bottoming zone.
  - **Turnover 0.5% to 2%**: normal activity and stable sentiment.
  - **Turnover 2% to 5%**: active market attention; do not chase.
  - **Turnover above 5%**: high heat with speculative inflow; watch for a sentiment top.
  - **Average turnover above 10%**: extreme overheating, often a short-term top.

  ### Step 2: Turnover trend over time
  Use `get_daily_history` to calculate the last 20 days:
  - Falling turnover with shrinking volume: sentiment is cooling; wait patiently.
  - Rising turnover with sharp volume expansion: sentiment is starting; participation may be justified.
  - One-day volume explosion above five times the prior level: often distribution risk.

  ### Step 3: News sentiment
  Use `search_stock_news`:
  - Concentrated good-news headlines, earnings beats, limit-up coverage, or broker upgrades can mean sentiment is overheated.
  - Earnings deterioration, bad news, or support breaks can create pessimism and possible bottoms.
  - Extremely negative retail/social sentiment can be a contrarian bottom signal.

  ### Step 4: Moving-average compression and volatility
  Use `analyze_trend`:
  - MA5/MA10/MA20 compression indicates a quiet accumulation phase with undecided direction.
  - Low ATR or low volatility suggests depressed sentiment before a possible expansion move.

  ## Sentiment Bottom Characteristics
  At least three of the following:
  - Last-20-day turnover is near its one-year low.
  - Volume keeps shrinking and is below 50% of the 60-day average.
  - Recent news is quiet, neutral, or negative.
  - Price is near or below MA20 without a panic crash.
  - Institutional holdings are stable or rising, if data exists.

  ## Sentiment Top Characteristics
  At least three of the following:
  - Last-5-day turnover is more than two times the last-20-day average.
  - One-day volume expands sharply.
  - News focuses on realized good news, large target-price upgrades, or retail crowding.
  - Price is more than 8% above MA5.
  - MACD top divergence appears.

  ## Output Requirements
  - Classify current sentiment as cold bottom, stable, warming entry, overheated caution, or mania top.
  - Compare current turnover with its one-year average.
  - List which bottom or top characteristics are met.
  - Provide contrarian advice: be greedy when the crowd panics and cautious when the crowd is greedy.

  Suggested score adjustments:
  - At least three bottom characteristics: `sentiment_score +14`
  - All five bottom characteristics: `sentiment_score +20`
  - At least three top characteristics: `sentiment_score -12`
  - All five top characteristics: `sentiment_score -20`
  - Stable sentiment: no base-score adjustment
