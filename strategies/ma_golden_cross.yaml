# MA Golden Cross Strategy
# MA5 crosses above MA10, or MA10 crosses above MA20, with volume confirmation.

name: ma_golden_cross
display_name: MA Golden Cross
description: Detects moving-average golden crosses with volume confirmation, a classic trend reversal or continuation signal.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [ma golden cross, golden cross]
default_priority: 20
market_regimes: [trending_up]

instructions: |
  **MA Golden Cross Strategy**

  Signal criteria:

  1. **Golden-cross detection**
     - Use `analyze_trend` to inspect moving-average alignment and MACD status.
     - Primary signal: MA5 crosses above MA10 within the last three trading days.
     - Stronger signal: MA10 crosses above MA20, which is slower but more reliable.
     - Check whether MACD is also crossing bullishly, preferably above the zero line.

  2. **Volume confirmation**
     - Volume on the cross day should exceed the 5-day average.
     - Use `get_daily_history` for validation.
     - Volume ratio above 1.2 on the cross day is constructive.

  3. **Trend background**
     - A golden cross after sideways consolidation is the strongest setup.
     - A golden cross inside an uptrend is a continuation signal.
     - A golden cross during a deep decline is weaker and needs more confirmation.

  4. **Price position**
     - Price should be near or above the crossing averages.
     - Bias should stay below 5% to avoid late chase entries.

  Score adjustments:
  - MA5 x MA10 golden cross with volume: `sentiment_score +10`
  - MA10 x MA20 golden cross: `sentiment_score +8`
  - MACD golden cross above the zero line: additional `+5`
  - Mention `MA golden cross` in `ma_analysis` and `buy_reason`.
  - Ideal entry is near the crossing moving averages.
