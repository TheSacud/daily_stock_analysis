# Sector Leader Strategy
# Identifies leading stocks during sector rotation cycles.

name: dragon_head
display_name: Sector Leader
description: Identifies sector leaders during rotation, especially when a sector starts moving or an industry catalyst appears.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
aliases: [sector leader, leading stock]
default_priority: 90
market_regimes: [sector_hot]

instructions: |
  **Sector Leader Strategy**

  Evaluation criteria:

  1. **Sector leadership**
     - Use `get_sector_rankings` to check whether the stock's sector is among recent leaders.
     - Confirm whether the stock moved early or hit limit-up early in the sector cycle.

  2. **Turnover and momentum**
     - Use `get_realtime_quote` to check turnover rate; leaders often have turnover above 5%.
     - Volume ratio above 1.5 indicates active trading interest.

  3. **Relative strength**
     - Compare the stock's move with the sector average.
     - A true leader should outperform the sector by at least two percentage points on strong days.

  4. **News catalyst**
     - Use `search_stock_news` to look for sector-level catalysts such as policy, events, or earnings.
     - Leader moves usually appear with broader sector catalysts.

  5. **Bias check**
     - Strong leaders may tolerate bias up to 7%, but above 10% still requires caution.

  Score adjustments:
  - Confirmed sector leader: `sentiment_score +10`
  - Sector is in active rotation: additional `+5`
  - Mention `sector leader strategy` in `buy_reason`.
