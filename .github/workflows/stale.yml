# Automatically close stale issues and PRs.
# Checks daily and marks long-inactive issues/PRs as stale.

name: Stale Issues & PRs

on:
  schedule:
    # Check once per day at UTC 00:00.
    - cron: '0 0 * * *'
  # Manual trigger.
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Clean stale issues/PRs
    runs-on: ubuntu-latest

    steps:
      - name: Mark and close stale items
        uses: actions/stale@v10
        with:
          # ===== Issue config =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has had no activity for **7 days**.

            If the problem still exists, please reply with the latest status and we will continue following up.
            If the problem is resolved or no longer needed, you can close this issue directly.

            **If there is no reply within 7 days, this issue will be closed automatically.**
          close-issue-message: |
            This issue has been closed automatically because it has had no activity for an extended period.

            If the problem still exists, feel free to reopen it or create a new issue.

          # ===== PR config =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has had no activity for **21 days**.

            Please check whether you need to:
            - Resolve merge conflicts
            - Reply to review feedback
            - Update code

            **If there is no update within 14 days, this PR will be closed automatically.**
          close-pr-message: |
            This PR has been closed automatically because it has had no activity for an extended period.

            If you still want to merge these changes, please reopen this PR or create a new one.

          # ===== Exclusions =====
          # Items with these labels will not be marked stale.
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'

          # Exclude draft PRs.
          exempt-draft-pr: true

          # ===== Other config =====
          # Maximum number of items processed per run.
          operations-per-run: 50

          # Process only items with these labels.
          only-labels: ''

          # Remove the stale label when there is new activity.
          remove-stale-when-updated: true

          # Debug mode. When true, only print actions.
          debug-only: false