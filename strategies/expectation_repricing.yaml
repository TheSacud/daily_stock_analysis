# Expectation Repricing Strategy

name: expectation_repricing
display_name: Expectation Repricing
description: Analyzes changes in earnings, policy, and valuation expectations to find expectation-gap repair or downside risk after excessive optimism.
category: framework
core_rules: [3, 5, 6]
required_tools:
  - search_stock_news
  - get_stock_info
  - get_realtime_quote
  - analyze_trend
aliases: [expectations, expectation gap, repricing]
default_priority: 65
market_regimes: [volatile, sector_hot]

instructions: |
  **Expectation Repricing Strategy**

  Use cases:
  - Market expectations for earnings, policy, industry cycle, valuation anchor, or competitive position are changing.
  - Decide whether the current price reflects expectation repair, expectation failure, or overheated expectations.

  Analysis framework:

  1. **Expectation source**
     - Use `search_stock_news` to identify information changing market expectations: earnings guidance, broker views, orders, policy, product progress, or industry data.
     - Distinguish hard information such as announcements, financial reports, and orders from soft information such as rumors, opinions, and sentiment.

  2. **Expectation-gap direction**
     - Positive expectation gap: the market was pessimistic, and new information shows business or earnings are better than expected.
     - Negative expectation gap: the market was optimistic, and new information disappoints or invalidates the thesis.
     - If the information has already been fully priced by a continuous rally, flag realization risk.

  3. **Valuation repricing**
     - Use PE, PB, market cap, ROE, cash flow, and related fields to judge whether repricing is fundamentally supported.
     - A higher valuation needs earnings quality, sustainable growth, and industry runway.
     - For valuation compression, distinguish one-off disturbance from a permanent thesis change.

  4. **Price confirmation**
     - Use `analyze_trend` to judge whether the expectation change has become a trend.
     - A high-volume breakout confirms funding support; a low-volume rebound is more likely a repair watch signal.
     - High-volume stalling, no rally after good news, or a break below key support may indicate weakening expectations.

  Output requirements:
  - Classify the state as positive expectation gap, realized expectation, negative expectation gap, or unclear expectation.
  - Explain which information changed expectations and which assumptions still need verification.
  - Provide observation points such as the next financial report, order conversion, policy implementation, valuation reset, or technical confirmation.

  Suggested score adjustments:
  - Positive expectation gap not fully priced: `sentiment_score +15`
  - Positive expectation gap already realized by a sharp rally: `sentiment_score -5`
  - Negative expectation gap or invalidated core assumption: `sentiment_score -15`
  - Insufficient information but possible repair: keep neutral and lower confidence
