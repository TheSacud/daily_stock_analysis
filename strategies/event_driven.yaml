# Event Driven Strategy

name: event_driven
display_name: Event Driven
description: Evaluates catalysts such as earnings, policy, M&A, orders, and product launches by catalyst strength, realization probability, and risk boundary.
category: framework
core_rules: [3, 5]
required_tools:
  - search_stock_news
  - get_realtime_quote
  - analyze_trend
aliases: [event driven, catalyst, event catalyst]
default_priority: 45
market_regimes: [sector_hot, volatile]

instructions: |
  **Event Driven Strategy**

  Use cases:
  - A company or industry has a clear catalyst such as earnings guidance, order win, M&A, restructuring, policy implementation, product launch, regulatory penalty, or litigation.
  - Decide whether the event is a short-term trading catalyst, a long-term fundamental improvement, or already realized good news.

  Analysis framework:

  1. **Event classification**
     - Use `search_stock_news` to summarize recent key events.
     - Classify events as earnings, policy, order/product, capital operation, or regulatory/risk events.
     - State event timing; stale or undated information must not be the primary basis.

  2. **Impact path**
     - Judge whether the event affects revenue, margin, valuation, financing capacity, market share, or only sentiment.
     - For major orders or policy benefits, explain realization timeline and uncertainty.
     - For regulation, selling pressure, penalties, litigation, or similar events, prioritize risk.

  3. **Market reaction**
     - Use `get_realtime_quote` and `analyze_trend` to judge whether price has fully reflected the event.
     - High-volume advance below key resistance may require waiting for confirmation.
     - High-volume stalling or a fade after good news suggests realization pressure.

  4. **Trading plan**
     - Before event realization, emphasize position control and time window.
     - After realization, reassess whether the trade should shift from expectation trading to earnings validation.
     - For negative events, first judge whether risk has been fully released before considering a rebound.

  Output requirements:
  - Classify the event as positive, negative, neutral, or uncertain.
  - Provide event credibility, realization timeline, and degree already priced in.
  - Include invalidation conditions, such as disappointing filings, break below support, or fading event attention.

  Suggested score adjustments:
  - High-credibility positive event not fully priced: `sentiment_score +14`
  - Positive event already largely realized: `sentiment_score -6`
  - Negative event still developing: `sentiment_score -15`
  - Unclear or conflicting information: stay neutral and lower confidence
