# Volume Breakout Strategy
# Price breaks above resistance on heavy volume, normally above two times average volume.

name: volume_breakout
display_name: Volume Breakout
description: Detects high-volume resistance breakouts when price approaches a known resistance zone.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [volume breakout, breakout]
default_priority: 30
market_regimes: [trending_up]

instructions: |
  **Volume Breakout Strategy**

  Breakout criteria:

  1. **Resistance identification**
     - Use `analyze_trend` and its `resistance_levels` output.
     - Typical resistance is a 20-day high or the top of a prior consolidation range.

  2. **Volume confirmation**
     - Current-day volume should be more than two times the 5-day average.
     - Use `get_realtime_quote` and confirm `volume_ratio > 2.0` when available.
     - Cross-check the average volume with `get_daily_history`.

  3. **Price confirmation**
     - Closing price must stand above resistance.
     - The close should be in the upper 30% of the day's range.
     - After breakout, the bias should still be below 5% to avoid chasing.

  4. **Follow-through validation**
     - If data is available, the next open should stay above the breakout level to distinguish true and false breakouts.

  5. **Risk filter**
     - Use `search_stock_news` to confirm there is no major negative news.
     - Avoid very expensive speculative breakouts when valuation risk is obvious.

  Score adjustments:
  - Confirmed high-volume breakout: `sentiment_score +12`
  - Breakout with sector confirmation: additional `+5`
  - Ideal entry is near the breakout level; stop is 3% below it.
  - Mention `volume breakout` in `buy_reason` and `volume_analysis`.
