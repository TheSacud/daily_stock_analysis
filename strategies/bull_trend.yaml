# Default Bull Trend Strategy

name: bull_trend
display_name: Default Bull Trend
description: Default single-stock analysis strategy for bullish alignment, trend continuation, and disciplined pullback entries.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [trend, trend analysis, bull trend]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **Default Bull Trend Strategy**

  Use cases:
  - Default strategy for regular single-stock analysis.
  - Prefer opportunities with upward trend, controlled risk, and no chase entry.

  Analysis framework:

  1. **Trend confirmation, highest priority**
     - Use `analyze_trend` to review MA5/MA10/MA20 alignment.
     - Treat MA5 >= MA10 >= MA20 with an upward MA20 slope as a bullish structure.
     - If price clearly breaks below MA20, reduce bullish weight.

  2. **Position and timing**
     - Prefer pullbacks that hold support over chasing extended prices.
     - If price is too far above MA5/MA10, recommend waiting for a pullback.
     - A high-volume breakout through valid resistance can raise the win-rate assessment.

  3. **Volume-price validation**
     - Use `get_daily_history` to check whether breakout or rebound days have expanding volume.
     - Be cautious with low-volume advances and watch for divergence when price stalls on heavy volume.

  4. **Trading recommendation output**
     - State a clear buy, wait, or reduce-position bias with trigger conditions.
     - Always provide a stop reference, such as below MA20 or below a structural low.
     - If there is no clear edge, explicitly recommend no trade to avoid overtrading.

  Suggested score adjustments:
  - Bullish moving-average alignment with good trend strength: `sentiment_score +12`
  - Pullback stabilizes at a key moving average: `sentiment_score +8`
  - High-volume breakout through key resistance: `sentiment_score +10`
  - Break below MA20 or trend deterioration: `sentiment_score -12`
