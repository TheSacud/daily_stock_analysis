# Bottom Volume Surge Strategy
# After an extended decline, price stabilizes while volume spikes, creating a possible reversal signal.

name: bottom_volume
display_name: Bottom Volume Surge
description: Detects bottom volume-surge signals after a long decline, indicating a possible trend reversal.
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [bottom volume, capitulation volume]
default_priority: 60
market_regimes: [trending_down]

instructions: |
  **Bottom Volume Surge Strategy**

  Reversal criteria:

  1. **Sustained decline confirmation**
     - Use `get_daily_history` for at least 30 days.
     - Price decline from the 20-day high to the recent low should exceed 15%.
     - `analyze_trend.trend_status` should be BEAR or STRONG_BEAR.

  2. **Volume anomaly**
     - Current-day volume should be more than three times the 5-day average.
     - Use `get_realtime_quote.volume_ratio > 3.0` when available.
     - The spike should occur after a period of extremely low volume.

  3. **Price stabilization**
     - The current candle should close green, with close above open.
     - Price should hold the recent low.
     - A long lower shadow is preferred because it shows buyer support.

  4. **Confirmation factors**
     - Use `search_stock_news` to check whether a fundamental catalyst exists.
     - Chip distribution, if available, should show average cost near current price.

  5. **Risk warning**
     - This is a reversal signal and is riskier than trend following.
     - Suggested position size should be smaller, normally no more than 20% to 30%.
     - Stop loss must be strict, below the recent low.

  Score adjustments:
  - Confirmed bottom volume surge: `sentiment_score +8`
  - Bullish candle plus news catalyst: additional `+5`
  - Mention `bottom volume surge` in `buy_reason` and `pattern_analysis`.
  - Stop should be set below the recent low.
